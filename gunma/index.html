<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT Signage - Oura</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: "Inter", "Hiragino Kaku Gothic ProN", sans-serif; }
        .canvas { width: 512px; height: 128px; position: relative; overflow: hidden; }

        .scene { position: absolute; top: 0; left: 0; width: 512px; height: 128px; display: none; }
        .scene.active { display: flex; }

        .panel { width: 128px; height: 128px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; border-right: 1px solid #222; flex-shrink: 0; }
        
        .label { font-size: 11px; font-weight: 500; color: #999; margin-bottom: 2px; }
        .time-val { font-size: 38px; font-weight: 800; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
        .val { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
        .unit { font-size: 14px; margin-left: 2px; font-weight: 400; }
        
        .face-svg { width: 85px; height: 85px; }
        .weather-svg { width: 60px; height: 60px; }

        .scene1-state { display: none; width: 512px; height: 128px; flex-direction: row; }
        .scene1-state.active { display: flex; }

        .conveyor-track { display: flex; flex-direction: row; width: 1024px; transition: transform 0.6s ease-in-out; }

        .ticker-scene { background-color: #000; display: none; align-items: center; overflow: hidden; }
        .ticker-track { display: flex; align-items: center; white-space: nowrap; height: 128px; }
        
        .msg-block { width: 256px; height: 128px; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; }
        .msg-text { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.2; text-align: center; }
        .msg-icon-block { width: 60px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .msg-face { width: 44px; height: 44px; }
        
        .animate-ticker { animation: ticker-anim 16s linear forwards; }
        @keyframes ticker-anim {
            0% { transform: translateX(512px); }
            100% { transform: translateX(-1300px); }
        }
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-sunny" viewBox="0 0 120 120"><circle cx="60" cy="60" r="24" fill="#ff4d00"/><g stroke="#ff4d00" stroke-width="8" stroke-linecap="round"><line x1="60" y1="15" x2="60" y2="30"/><line x1="60" y1="90" x2="60" y2="105"/><line x1="15" y1="60" x2="30" y2="60"/><line x1="90" y1="60" x2="105" y2="60"/><line x1="28" y1="28" x2="39" y2="39"/><line x1="81" y1="81" x2="92" y2="92"/><line x1="28" y1="92" x2="39" y2="81"/><line x1="81" y1="39" x2="92" y2="28"/></g></symbol>
    <symbol id="icon-cloudy" viewBox="0 0 100 100"><path d="M25,65 a20,20 0 1,1 20,-20 a25,25 0 1,1 40,5 a15,15 0 1,1 0,30 h-60 a20,20 0 1,1 0,-40" fill="#999"/></symbol>
    <symbol id="icon-rainy" viewBox="0 0 100 100"><path d="M25,65 a20,20 0 1,1 20,-20 a25,25 0 1,1 40,5 a15,15 0 1,1 0,30 h-60 a20,20 0 1,1 0,-40" fill="#666"/><path d="M45,75 L40,90 M65,75 L60,90" stroke="#00b0f0" stroke-width="6" stroke-linecap="round"/></symbol>
    <symbol id="face-0" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#00b0f0"/><circle cx="35" cy="40" r="5" fill="#fff"/><circle cx="65" cy="40" r="5" fill="#fff"/><path d="M 30 65 Q 50 85 70 65" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/></symbol>
    <symbol id="face-1" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ffff00"/><circle cx="35" cy="40" r="5" fill="#000"/><circle cx="65" cy="40" r="5" fill="#000"/><line x1="30" y1="70" x2="70" y2="70" stroke="#000" stroke-width="5" stroke-linecap="round"/></symbol>
    <symbol id="face-2" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ffff00"/><path d="M 30 45 Q 35 35 40 45 M 60 45 Q 65 35 70 45" stroke="#000" stroke-width="4" fill="none"/><path d="M 35 75 Q 50 65 65 75" stroke="#000" stroke-width="5" fill="none" stroke-linecap="round"/></symbol>
    <symbol id="face-3" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff6600"/><line x1="25" y1="35" x2="40" y2="45" stroke="#fff" stroke-width="6"/><line x1="40" y1="35" x2="25" y2="45" stroke="#fff" stroke-width="6"/><line x1="60" y1="35" x2="75" y2="45" stroke="#fff" stroke-width="6"/><line x1="75" y1="35" x2="60" y2="45" stroke="#fff" stroke-width="6"/><path d="M 35 75 Q 50 65 65 75" stroke="#fff" stroke-width="5" fill="none"/></symbol>
    <symbol id="face-4" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff0000"/><line x1="25" y1="35" x2="40" y2="45" stroke="#fff" stroke-width="6"/><line x1="40" y1="35" x2="25" y2="45" stroke="#fff" stroke-width="6"/><line x1="60" y1="35" x2="75" y2="45" stroke="#fff" stroke-width="6"/><line x1="75" y1="35" x2="60" y2="45" stroke="#fff" stroke-width="6"/><path d="M 30 75 Q 35 65 40 75 T 50 75 T 60 75 T 70 75" stroke="#fff" stroke-width="5" fill="none"/></symbol>
</svg>

<div class="canvas">
    <div class="scene active" id="scene1">
        <div class="scene1-state active" id="s1-stateA">
            <div class="panel"><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
            <div class="panel"><div class="label">時刻</div><div class="clock-hm time-val">--:--</div></div>
            <div class="panel"><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
            <div class="panel"><div class="label">時刻</div><div class="clock-hm time-val">--:--</div></div>
        </div>
        <div class="scene1-state" id="s1-stateB">
            <div class="panel"><div class="label">時刻</div><div class="clock-hm time-val">--:--</div></div>
            <div class="panel"><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
            <div class="panel"><div class="label">時刻</div><div class="clock-hm time-val">--:--</div></div>
            <div class="panel"><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
        </div>
    </div>

    <div class="scene" id="scene2">
        <div class="conveyor-track" id="conveyor">
            <div class="panel" style="position: relative;"><div style="position: absolute; top: 4px; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 0.05em;">邑楽郡</div><div class="label">天気</div><svg class="weather-svg"><use class="weather-icon-use" href="#icon-sunny"/></svg></div>
            <div class="panel" style="position: relative;"><div style="position: absolute; top: 4px; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 0.05em;">邑楽郡</div><div class="label">気温</div><div class="val"><span class="temp-val">--</span><span class="unit">℃</span></div></div>
            <div class="panel" style="position: relative;"><div style="position: absolute; top: 4px; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 0.05em;">邑楽郡</div><div class="label">湿度</div><div class="val"><span class="humi-val">--</span><span class="unit">%</span></div></div>
            <div class="panel"><div class="label">暑さ指数</div><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
            <div class="panel" style="position: relative;"><div style="position: absolute; top: 4px; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 0.05em;">邑楽郡</div><div class="label">天気</div><svg class="weather-svg"><use class="weather-icon-use" href="#icon-sunny"/></svg></div>
            <div class="panel" style="position: relative;"><div style="position: absolute; top: 4px; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 0.05em;">邑楽郡</div><div class="label">気温</div><div class="val"><span class="temp-val">--</span><span class="unit">℃</span></div></div>
            <div class="panel" style="position: relative;"><div style="position: absolute; top: 4px; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 0.05em;">邑楽郡</div><div class="label">湿度</div><div class="val"><span class="humi-val">--</span><span class="unit">%</span></div></div>
            <div class="panel"><div class="label">暑さ指数</div><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
        </div>
    </div>

    <div class="scene ticker-scene" id="scene3">
        <div class="ticker-track" id="ticker-track"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat') || '36.2570'; 
    const lon = params.get('lon') || '139.4633';

    const multi = [
        { jp:"【ほぼ安全】\n適宜水分補給", en:"Safe:\nStay hydrated", vn:"An toàn:\nBổ sung nước", cn:"基本安全：\n注意补水" },
        { jp:"【注意】\n積極的に水分補給", en:"Caution:\nActively hydrate", vn:"Chú ý:\nUống nước thường xuyên", cn:"注意：\n及时补水" },
        { jp:"【警戒】\n定期的に休憩", en:"Warning:\nTake regular breaks", vn:"Cảnh báo:\nNghỉ ngơi định kỳ", cn:"警戒：\n定时休息" },
        { jp:"【厳重警戒】\n激しい作業中止", en:"Severe Warning:\nStop intense work", vn:"Cảnh báo nghiêm trọng:\nNgừng làm việc nặng", cn:"严重警戒：\n停止剧烈作业" },
        { jp:"【危険】\n作業を直ちに中止", en:"Danger:\nStop work immediately", vn:"Nguy hiểm:\nDừng công việc ngay", cn:"危険：\n立即停止作业" }
    ];

    let currentWbgtLevel = 0;
    const s1 = document.getElementById('scene1');
    const s1A = document.getElementById('s1-stateA');
    const s1B = document.getElementById('s1-stateB');
    const s2 = document.getElementById('scene2');
    const conveyor = document.getElementById('conveyor');
    const s3 = document.getElementById('scene3');
    const tickerTrack = document.getElementById('ticker-track');

    function updateClock() {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.querySelectorAll('.clock-hm').forEach(el => el.innerText = timeStr);
    }

    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code`);
            const data = await res.json();
            const temp = data.current.temperature_2m;
            const humi = data.current.relative_humidity_2m;
            const code = data.current.weather_code;

            let wIcon = "#icon-sunny";
            if (code >= 1 && code <= 3) wIcon = "#icon-cloudy";
            else if (code >= 51) wIcon = "#icon-rainy";
            document.querySelectorAll('.weather-icon-use').forEach(el => el.setAttribute('href', wIcon));

            const wbgt = (0.725 * temp) + (0.0368 * humi) + (0.00115 * temp * humi) - 2.503;
            currentWbgtLevel = wbgt >= 31 ? 4 : wbgt >= 28 ? 3 : wbgt >= 25 ? 2 : wbgt >= 21 ? 1 : 0;

            document.querySelectorAll('.temp-val').forEach(el => el.innerText = Math.round(temp));
            document.querySelectorAll('.humi-val').forEach(el => el.innerText = Math.round(humi));
            document.querySelectorAll('.face-use').forEach(el => el.setAttribute('href', '#face-' + currentWbgtLevel));
            buildTicker();
        } catch (e) { console.error(e); }
    }

    function buildTicker() {
        const m = multi[currentWbgtLevel];
        const faceHtml = `<div class="msg-icon-block"><svg class="msg-face"><use href="#face-${currentWbgtLevel}"/></svg></div>`;
        const formatMsg = (text) => `<div class="msg-block"><div class="msg-text">${text.replace(/\n/g, '<br>')}</div></div>`;
        tickerTrack.innerHTML = formatMsg(m.jp) + faceHtml + formatMsg(m.en) + faceHtml + formatMsg(m.vn) + faceHtml + formatMsg(m.cn) + faceHtml;
    }

    function startSequence() { playScene1(); }

    function playScene1() {
        s1.classList.add('active');
        s2.classList.remove('active');
        s3.classList.remove('active');
        s1A.classList.add('active');
        s1B.classList.remove('active');
        setTimeout(() => {
            s1A.classList.remove('active');
            s1B.classList.add('active');
            setTimeout(() => {
                s1.classList.remove('active');
                playScene2();
            }, 5000);
        }, 5000);
    }

    function playScene2() {
        s2.classList.add('active');
        let step = 0;
        conveyor.style.transition = 'none';
        conveyor.style.transform = 'translateX(0px)';
        function slideNext() {
            step++;
            conveyor.style.transition = 'transform 0.6s ease-in-out';
            conveyor.style.transform = `translateX(-${step * 128}px)`;
            if (step < 4) { setTimeout(slideNext, 5000); } 
            else { setTimeout(() => { s2.classList.remove('active'); playScene3(); }, 1000); }
        }
        setTimeout(slideNext, 5000);
    }

    function playScene3() {
        s3.classList.add('active');
        tickerTrack.classList.remove('animate-ticker');
        void tickerTrack.offsetWidth;
        tickerTrack.classList.add('animate-ticker');
        setTimeout(() => {
            s3.classList.remove('active');
            tickerTrack.classList.remove('animate-ticker');
            startSequence();
        }, 16000); 
    }

    window.onload = function() {
        updateClock();
        setInterval(updateClock, 1000);
        fetchWeather();
        setInterval(fetchWeather, 300000);
        setTimeout(startSequence, 500); 
    };
</script>
</body>
</html>
