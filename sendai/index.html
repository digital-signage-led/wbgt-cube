<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT Signage - 512x128</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        .canvas { width: 512px; height: 128px; display: flex; }
        .face { width: 128px; height: 128px; position: relative; border-right: 1px solid #333; box-sizing: border-box; }
        .set-group { display: none; width: 128px; height: 128px; justify-content: center; align-items: center; flex-direction: column; }
        .active { display: flex !important; }
        .time-val { font-size: 32px; font-weight: 800; color: #fff; }
        .face-svg { width: 80px; height: 80px; }
    </style>
</head>
<body>
    <div class="canvas" id="canvas"></div>

    <script>
        const lat = '38.2682'; // 仙台
        const lon = '140.8694';
        const canvas = document.getElementById('canvas');

        // 4面分作成
        for (let i = 0; i < 4; i++) {
            const face = document.createElement('div');
            face.className = 'face';
            face.innerHTML = `
                <div class="set-group active" data-set="1"><svg class="face-svg"><use href="#face-0"/></svg></div>
                <div class="set-group" data-set="2"><div class="time-val" id="clock">--:--</div></div>
            `;
            canvas.appendChild(face);
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.querySelectorAll('#clock').forEach(el => el.innerText = timeStr);
        }

        let currentSet = 1;
        function switchDisplay() {
            currentSet = (currentSet === 1) ? 2 : 1;
            document.querySelectorAll('.set-group').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.set) === currentSet);
            });
            setTimeout(switchDisplay, 5000);
        }

        setInterval(updateClock, 1000);
        switchDisplay();
    </script>
</body>
</html>
