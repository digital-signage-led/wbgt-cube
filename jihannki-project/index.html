<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=640, height=192, initial-scale=1">
<title>販売機 WBGT 640×192</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --font-forecast: "M PLUS 1p", "Noto Sans JP", sans-serif;
  --wbgt-safe: #2F8CDC;
  --wbgt-caution: #FDD72E;
  --wbgt-warning: #FDBA2B;
  --wbgt-alert: #FE7D03;
  --wbgt-danger: #D31715;
  --stage-w: 640px;
  --stage-h: 192px;
  /* 表示窓: 横 129px ～ 384px（幅 255px）× 高さ 192px */
  --view-x: 129px;
  --view-end: 384px;
  --view-w: calc(var(--view-end) - var(--view-x));
  --view-h: 192px;
  --design-h: 480px;
  --scale: calc(var(--view-h) / var(--design-h));
  /* 高さ基準の縮尺で、横も 255px にぴったり収める設計幅 */
  --design-w: calc(var(--view-w) / var(--scale));
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: var(--stage-w);
  height: var(--stage-h);
  overflow: hidden;
  background: #000;
  font-family: Arial, "Noto Sans JP", sans-serif;
}

#stage {
  position: relative;
  width: var(--stage-w);
  height: var(--stage-h);
  overflow: hidden;
  background: #000;
}

#viewport {
  position: absolute;
  left: var(--view-x);
  top: 0;
  width: var(--view-w);
  height: var(--view-h);
  overflow: hidden;
  background: #000;
}

#scaler {
  width: var(--view-w);
  height: var(--view-h);
  overflow: hidden;
  position: relative;
}

#contentRoot {
  position: absolute;
  left: 0;
  top: 0;
  width: var(--design-w);
  height: var(--design-h);
  transform: scale(var(--scale));
  transform-origin: top left;
}

.wrap {
  position: relative;
  width: var(--design-w);
  height: var(--design-h);
}

video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.5s;
}
video.active { opacity: 1; }

.panel {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
  padding: 6px 10px 4px;
  color: #fff;
  font-weight: 800;
  text-shadow: 0 1px 2px #000, 0 0 10px #000, 0 0 16px rgba(0,0,0,0.95);
  pointer-events: none;
}

.panel-top {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  overflow: hidden;
}

.row-bottom {
  min-height: 0;
  height: 100%;
  overflow: hidden;
  font-family: var(--font-forecast);
}

.rotate-box {
  position: relative;
  height: 100%;
  min-height: 0;
  overflow: hidden;
}

.rotate-view {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.55s ease;
  display: flex;
  flex-direction: column;
  padding: 2px 4px;
  min-height: 0;
  overflow: hidden;
}

.rotate-view[data-bottom-view="2"] {
  padding: 0 2px 2px;
}

.rotate-view[data-bottom-view="2"] .slot-title {
  margin-bottom: 0;
  font-size: 24px;
}
.rotate-view.active {
  opacity: 1;
  z-index: 1;
}

.slot-title {
  font-size: 28px;
  font-weight: 900;
  flex-shrink: 0;
  line-height: 1.1;
  margin-bottom: 2px;
  color: #fff;
  -webkit-text-stroke: 1px rgba(0,0,0,0.8);
}

.row-main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-items: start;
}

.col-temp {
  line-height: 0.92;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

#clock {
  font-size: 100px;
  font-weight: 900;
  letter-spacing: 2px;
  white-space: nowrap;
  line-height: 0.95;
}

#temp {
  font-size: 72px;
  font-weight: 900;
  letter-spacing: -2px;
  white-space: nowrap;
  line-height: 1;
  margin-top: 4px;
}

.col-wbgt {
  text-align: right;
  line-height: 1.1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

#wbgtVal {
  font-size: 72px;
  font-weight: 900;
}

#wbgtTelop {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 14px;
  border-radius: 6px;
  font-size: 34px;
  font-weight: 900;
  line-height: 1.15;
  white-space: nowrap;
  text-shadow: none;
}

#weekly {
  display: flex;
  justify-content: space-between;
  gap: 6px;
  flex: 1;
  min-height: 0;
  align-items: center;
}

.day {
  flex: 1;
  min-width: 0;
  text-align: center;
  line-height: 1.15;
}

.day .d-label {
  font-size: 28px;
  font-weight: 900;
}

.wx-icon {
  display: block;
  margin: 0 auto;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.55));
}

.wx-icon svg {
  width: 100%;
  height: 100%;
  display: block;
}

.day .d-weather-icon {
  width: 64px;
  height: 64px;
  margin: 6px auto;
}

.day .d-temp {
  font-size: 28px;
  font-weight: 900;
  line-height: 1.1;
}

.day .d-sep {
  color: rgba(255, 255, 255, 0.75);
  margin: 0 1px;
}

#hourlyWeather {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  flex: 1;
  min-height: 0;
  align-items: center;
}

.hour-slot {
  flex: 1;
  min-width: 0;
  text-align: center;
  line-height: 1.1;
}

.hour-slot .h-time {
  font-size: 28px;
  font-weight: 900;
}

.hour-slot .h-icon,
.hour-slot .h-wx {
  width: 56px;
  height: 56px;
  margin: 4px auto;
}

.hour-slot .h-temp {
  font-size: 32px;
  font-weight: 900;
}

#hourlyChart {
  display: block;
  width: 100%;
  flex: 1;
  min-height: 0;
}
</style>
</head>
<body>

<div id="stage">
  <div id="viewport">
    <div id="scaler">
      <div id="contentRoot">
        <div class="wrap">
          <video id="v_safe" class="active" autoplay muted loop playsinline src="video/safe_fix.mp4"></video>
          <video id="v_caution" autoplay muted loop playsinline src="video/caution_fix.mp4"></video>
          <video id="v_warning" autoplay muted loop playsinline src="video/warning_fix.mp4"></video>
          <video id="v_danger" autoplay muted loop playsinline src="video/danger_fix.mp4"></video>
          <video id="v_extreme" autoplay muted loop playsinline src="video/extreme_fix.mp4"></video>

          <div class="panel">
            <div class="panel-top">
            <div class="row-main">
              <div class="col-temp">
                <div id="clock">--:--</div>
                <div id="temp">--&#8451;</div>
              </div>
              <div class="col-wbgt">
                <div id="wbgtVal">WBGT --&#8451;</div>
                <div id="wbgtTelop">--</div>
              </div>
            </div>
            </div>
            <div class="row-bottom">
              <div class="rotate-box" id="bottomBox">
                <div class="rotate-view active" data-bottom-view="0">
                  <div class="slot-title">&#36913;&#38291;&#22825;&#27671;</div>
                  <div id="weekly"></div>
                </div>
                <div class="rotate-view" data-bottom-view="1">
                  <div class="slot-title">1&#26178;&#38291;&#12372;&#12392;&#12398;&#22825;&#27671;</div>
                  <div id="hourlyWeather"></div>
                </div>
                <div class="rotate-view" data-bottom-view="2">
                  <div class="slot-title">1&#26178;&#38291;&#12372;&#12392;&#12398;&#27671;&#28201;</div>
                  <canvas id="hourlyChart" width="600" height="150"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const apiKey = "25dfd71750eff566cb115e3dc1c9db1a";
const city = "Osaka";

let forecastDaily = [];
let hourlySeries = [];
const CHART_LINE = "#FF6B35";
const CHART_LINE_WIDTH = 4;
const CHART_DOT_R = 18;
const ROTATE_MS = 7000;
const HOURLY_COUNT = 6;
const FORECAST_FONT = '"M PLUS 1p", "Noto Sans JP", sans-serif';
let bottomViewIndex = 0;
const BOTTOM_VIEW_COUNT = 3;

function calcWbgt(temp, hum) {
  return 0.7 * temp + 0.3 * (hum / 5);
}

const WBGT_COLORS = {
  safe: "#2F8CDC",
  caution: "#FDD72E",
  warning: "#FDBA2B",
  alert: "#FE7D03",
  danger: "#D31715"
};

function wbgtColor(w) {
  if (w < 21) return WBGT_COLORS.safe;
  if (w < 25) return WBGT_COLORS.caution;
  if (w < 28) return WBGT_COLORS.warning;
  if (w < 31) return WBGT_COLORS.alert;
  return WBGT_COLORS.danger;
}

function getWbgtLevel(w) {
  if (w < 21) return "\u5B89\u5168";
  if (w < 25) return "\u6CE8\u610F";
  if (w < 28) return "\u8B66\u6212";
  if (w < 31) return "\u56B4\u91CD\u8B66\u6212";
  return "\u5371\u9677";
}

function getWbgtAdvice(w) {
  if (w < 21) return "\u901A\u5E38\u4F5C\u696D";
  if (w < 25) return "\u6C34\u5206\u88DC\u7D66";
  if (w < 28) return "\u5869\u5206\u88DC\u7D66";
  if (w < 31) return "\u4F11\u61A9\u63A8\u5968";
  return "\u4F5C\u696D\u4E2D\u6B62";
}

function switchVideo(w) {
  let key = "safe";
  if (w >= 21) key = "caution";
  if (w >= 25) key = "warning";
  if (w >= 28) key = "danger";
  if (w >= 31) key = "extreme";
  document.querySelectorAll("video").forEach(function(v) { v.classList.remove("active"); });
  document.getElementById("v_" + key).classList.add("active");
}

async function fetchWeather() {
  var url = "https://api.openweathermap.org/data/2.5/weather?q=" + city + "&appid=" + apiKey + "&units=metric&lang=ja";
  var r = await fetch(url);
  if (!r.ok) throw new Error("weather " + r.status);
  var d = await r.json();
  return {
    temp: Math.round(d.main.temp),
    hum: d.main.humidity,
    wind: (d.wind && d.wind.speed) ? d.wind.speed : 0,
    icon: d.weather[0].icon,
    desc: d.weather[0].description,
    feels: Math.round(d.main.feels_like),
    pressure: d.main.pressure,
    sunset: new Date(d.sys.sunset * 1000).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })
  };
}

async function fetchForecast() {
  var url = "https://api.openweathermap.org/data/2.5/forecast?q=" + city + "&appid=" + apiKey + "&units=metric&lang=ja";
  var r = await fetch(url);
  if (!r.ok) throw new Error("forecast " + r.status);
  var d = await r.json();
  hourlySeries = buildHourlySeries(d.list);
  var byDay = new Map();
  d.list.forEach(function(item) {
    var dt = new Date(item.dt * 1000);
    var key = dt.toLocaleDateString("ja-JP");
    if (!byDay.has(key)) {
      byDay.set(key, {
        label: dt.toLocaleDateString("ja-JP", { weekday: "short" }),
        dateLabel: (dt.getMonth() + 1) + "/" + dt.getDate(),
        temps: [],
        hums: [],
        icon: item.weather[0].icon
      });
    }
    var day = byDay.get(key);
    day.temps.push(item.main.temp);
    day.hums.push(item.main.humidity);
    day.icon = item.weather[0].icon;
  });
  return Array.from(byDay.values()).slice(0, 5).map(function(day) {
    var maxT = Math.max.apply(null, day.temps);
    var avgH = day.hums.reduce(function(a, b) { return a + b; }, 0) / day.hums.length;
    var wbgt = calcWbgt(maxT, avgH);
    var avgT = day.temps.reduce(function(a, b) { return a + b; }, 0) / day.temps.length;
    return {
      label: day.label,
      dateLabel: day.dateLabel,
      icon: day.icon,
      max: Math.round(maxT),
      min: Math.round(Math.min.apply(null, day.temps)),
      temp: Math.round(avgT),
      wbgt: Math.round(wbgt * 10) / 10
    };
  });
}

function buildHourlySeries(list) {
  var points = list
    .filter(function(item) { return item.dt * 1000 >= Date.now() - 3600000; })
    .map(function(item) {
      return {
        t: item.dt * 1000,
        temp: item.main.temp,
        icon: item.weather[0].icon,
        desc: item.weather[0].description
      };
    });
  if (points.length < 2) return [];

  var hourly = [];
  var start = Date.now();
  for (var h = 0; h < HOURLY_COUNT; h++) {
    var target = start + h * 3600000;
    var p0 = points[0];
    var p1 = points[points.length - 1];
    for (var j = 0; j < points.length - 1; j++) {
      if (target >= points[j].t && target <= points[j + 1].t) {
        p0 = points[j];
        p1 = points[j + 1];
        break;
      }
    }
    if (target > points[points.length - 1].t) {
      p0 = points[Math.max(0, points.length - 2)];
      p1 = points[points.length - 1];
    }
    var ratio = p1.t === p0.t ? 0 : (target - p0.t) / (p1.t - p0.t);
    var temp = p0.temp + (p1.temp - p0.temp) * ratio;
    var dt = new Date(target);
    hourly.push({
      temp: Math.round(temp),
      hourLabel: String(dt.getHours()).padStart(2, "0") + ":00",
      icon: ratio < 0.5 ? p0.icon : p1.icon,
      desc: ratio < 0.5 ? p0.desc : p1.desc
    });
  }
  return hourly;
}

function setBottomView(index) {
  bottomViewIndex = index;
  document.querySelectorAll("#bottomBox .rotate-view").forEach(function(el, i) {
    el.classList.toggle("active", i === index);
  });
  if (index === 2) drawHourlyChart();
}

function weatherIconType(icon) {
  var code = (icon || "").slice(0, 2);
  var night = (icon || "").slice(-1) === "n";
  if (code === "01") return night ? "clear-night" : "clear-day";
  if (code === "02") return night ? "partly-night" : "partly-day";
  if (code === "03" || code === "04") return night ? "cloudy-night" : "cloudy";
  if (code === "09") return "shower";
  if (code === "10") return "rain";
  if (code === "11") return "thunder";
  if (code === "13") return "snow";
  if (code === "50") return "mist";
  return "cloudy";
}

function weatherSvg(type) {
  var sun = '<circle cx="44" cy="22" r="11" fill="#FFB300"/><g stroke="#FF8F00" stroke-width="3" stroke-linecap="round"><line x1="44" y1="4" x2="44" y2="10"/><line x1="44" y1="34" x2="44" y2="40"/><line x1="26" y1="22" x2="32" y2="22"/><line x1="56" y1="22" x2="62" y2="22"/><line x1="31" y1="9" x2="35" y2="13"/><line x1="53" y1="31" x2="57" y2="35"/><line x1="31" y1="35" x2="35" y2="31"/><line x1="53" y1="13" x2="57" y2="9"/></g>';
  var moon = '<path d="M40 14a14 14 0 1 0 14 18A12 12 0 1 1 40 14z" fill="#FFE082"/>';
  var cloud = '<ellipse cx="32" cy="38" rx="20" ry="12" fill="#ECEFF1"/><ellipse cx="22" cy="34" rx="12" ry="10" fill="#F5F5F5"/><ellipse cx="42" cy="34" rx="14" ry="10" fill="#FFFFFF"/>';
  var cloudDark = '<ellipse cx="32" cy="38" rx="20" ry="12" fill="#90A4AE"/><ellipse cx="22" cy="34" rx="12" ry="10" fill="#B0BEC5"/><ellipse cx="42" cy="34" rx="14" ry="10" fill="#CFD8DC"/>';
  var rain = '<line x1="24" y1="50" x2="24" y2="58" stroke="#29B6F6" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="52" x2="32" y2="60" stroke="#29B6F6" stroke-width="3" stroke-linecap="round"/><line x1="40" y1="50" x2="40" y2="58" stroke="#29B6F6" stroke-width="3" stroke-linecap="round"/>';
  var snow = '<circle cx="26" cy="52" r="2.5" fill="#81D4FA"/><circle cx="32" cy="56" r="2.5" fill="#81D4FA"/><circle cx="38" cy="52" r="2.5" fill="#81D4FA"/>';
  var bolt = '<polygon points="34,46 30,56 36,56 32,64 42,50 36,50 40,46" fill="#FFEB3B"/>';
  var mist = '<line x1="16" y1="40" x2="48" y2="40" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round"/><line x1="20" y1="48" x2="44" y2="48" stroke="#CFD8DC" stroke-width="3" stroke-linecap="round"/><line x1="18" y1="56" x2="46" y2="56" stroke="#ECEFF1" stroke-width="3" stroke-linecap="round"/>';
  var body = "";
  if (type === "clear-day") body = sun;
  else if (type === "clear-night") body = moon;
  else if (type === "partly-day") body = sun + cloud;
  else if (type === "partly-night") body = moon + cloudDark;
  else if (type === "cloudy") body = cloud;
  else if (type === "cloudy-night") body = cloudDark;
  else if (type === "shower" || type === "rain") body = cloud + rain;
  else if (type === "thunder") body = cloudDark + rain + bolt;
  else if (type === "snow") body = cloud + snow;
  else if (type === "mist") body = mist;
  else body = cloud;
  return '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' + body + "</svg>";
}

function weatherIconHtml(icon, className, size) {
  var px = size || 64;
  return '<div class="' + className + ' wx-icon" style="width:' + px + "px;height:" + px + 'px">' +
    weatherSvg(weatherIconType(icon)) + "</div>";
}

function weeklyMinColor(temp) {
  if (temp <= 5) return "#5C9EFF";
  if (temp <= 12) return "#4FC3F7";
  if (temp <= 18) return "#81D4FA";
  return "#B3E5FC";
}

function renderWeekly(days) {
  var el = document.getElementById("weekly");
  if (!days.length) {
    el.innerHTML = '<div class="day">\u9031\u9593\u4E88\u5831\u306A\u3057</div>';
    return;
  }
  el.innerHTML = days.map(function(d) {
    return '<div class="day">' +
      '<div class="d-label">' + d.label + '</div>' +
      weatherIconHtml(d.icon, "d-weather-icon", 64) +
      '<div class="d-temp">' +
      '<span class="d-max" style="color:' + wbgtColor(d.wbgt) + '">' + d.max + '\u00B0</span>' +
      '<span class="d-sep">/</span>' +
      '<span class="d-min" style="color:' + weeklyMinColor(d.min) + '">' + d.min + '\u00B0</span>' +
      '</div>' +
      '</div>';
  }).join("");
}

function telopTextColor(bgHex) {
  var r = parseInt(bgHex.slice(1, 3), 16);
  var g = parseInt(bgHex.slice(3, 5), 16);
  var b = parseInt(bgHex.slice(5, 7), 16);
  var yiq = (r * 299 + g * 587 + b * 114) / 1000;
  return yiq >= 168 ? "#111111" : "#FFFFFF";
}

function applyWbgtDisplay(W) {
  var c = wbgtColor(W);
  var level = getWbgtLevel(W);
  var telop = document.getElementById("wbgtTelop");
  document.getElementById("wbgtVal").textContent = "WBGT " + W.toFixed(1) + "\u2103";
  document.getElementById("wbgtVal").style.color = c;
  telop.textContent = level;
  telop.style.backgroundColor = c;
  telop.style.color = telopTextColor(c);
}

function renderHourlyWeather(hours) {
  var el = document.getElementById("hourlyWeather");
  hours = hours.slice(0, HOURLY_COUNT);
  if (!hours.length) {
    el.innerHTML = '<div class="hour-slot">\u30C7\u30FC\u30BF\u306A\u3057</div>';
    return;
  }
  el.innerHTML = hours.map(function(h) {
    return '<div class="hour-slot">' +
      '<div class="h-time">' + h.hourLabel + '</div>' +
      weatherIconHtml(h.icon, "h-icon h-wx", 52) +
      '<div class="h-temp">' + h.temp + '\u2103</div>' +
      '</div>';
  }).join("");
}

function chartY(value, minV, maxV, graphTop, graphH) {
  var range = maxV - minV || 1;
  return graphTop + graphH - ((value - minV) / range) * graphH;
}

function chartPoints(data, minV, maxV, padL, step, graphTop, graphH) {
  return data.map(function(d, i) {
    return {
      x: padL + i * step,
      y: chartY(d.temp, minV, maxV, graphTop, graphH),
      temp: d.temp,
      hourLabel: d.hourLabel
    };
  });
}

function drawHourlyChart() {
  var c = document.getElementById("hourlyChart");
  if (!c) return;
  var ctx = c.getContext("2d");
  var w = c.width;
  var h = c.height;
  var data = hourlySeries.slice(0, HOURLY_COUNT);

  ctx.clearRect(0, 0, w, h);

  if (data.length < 2) {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "900 24px " + FORECAST_FONT;
    ctx.textAlign = "center";
    ctx.fillText("\u6C17\u6E29\u30C7\u30FC\u30BF\u53D6\u5F97\u4E2D\u2026", w / 2, h / 2);
    ctx.textAlign = "left";
    return;
  }

  var padL = CHART_DOT_R + 6;
  var padR = CHART_DOT_R + 6;
  var padT = 8;
  var padB = 28;
  var graphW = w - padL - padR;
  var graphH = h - padT - padB;
  var graphTop = padT;
  var graphBottom = graphTop + graphH;

  var values = data.map(function(d) { return d.temp; });
  var dataMin = Math.min.apply(null, values);
  var dataMax = Math.max.apply(null, values);
  var minV = Math.floor(dataMin / 5) * 5 - 5;
  var maxV = Math.ceil(dataMax / 5) * 5 + 5;
  if (maxV - minV < 8) maxV = minV + 8;
  var step = graphW / (data.length - 1);
  var pts = chartPoints(data, minV, maxV, padL, step, graphTop, graphH);

  for (var lv = minV; lv <= maxV; lv += 5) {
    var gy = chartY(lv, minV, maxV, graphTop, graphH);
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padL, gy);
    ctx.lineTo(w - padR, gy);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.moveTo(pts[0].x, graphBottom);
  pts.forEach(function(p) { ctx.lineTo(p.x, p.y); });
  ctx.lineTo(pts[pts.length - 1].x, graphBottom);
  ctx.closePath();
  var fillGrad = ctx.createLinearGradient(0, graphTop, 0, graphBottom);
  fillGrad.addColorStop(0, "rgba(255, 120, 70, 0.55)");
  fillGrad.addColorStop(1, "rgba(255, 120, 70, 0.04)");
  ctx.fillStyle = fillGrad;
  ctx.fill();

  ctx.strokeStyle = CHART_LINE;
  ctx.lineWidth = CHART_LINE_WIDTH;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.beginPath();
  pts.forEach(function(p, i) {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();

  pts.forEach(function(p) {
    ctx.fillStyle = CHART_LINE;
    ctx.beginPath();
    ctx.arc(p.x, p.y, CHART_DOT_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = "900 20px " + FORECAST_FONT;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(p.temp), p.x, p.y);

    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.font = "900 18px " + FORECAST_FONT;
    ctx.textBaseline = "alphabetic";
    ctx.fillText(p.hourLabel, p.x, graphBottom + 20);
    ctx.textAlign = "left";
  });
}

async function refresh() {
  try {
    var results = await Promise.all([fetchWeather(), fetchForecast()]);
    var w = results[0];
    var weekly = results[1];
    var W = calcWbgt(w.temp, w.hum);

    forecastDaily = weekly;

    switchVideo(W);

    document.getElementById("temp").textContent = w.temp + "\u2103";
    applyWbgtDisplay(W);

    renderWeekly(weekly);
    renderHourlyWeather(hourlySeries);
    if (bottomViewIndex === 2) drawHourlyChart();
  } catch (e) {
    console.error(e);
    document.getElementById("wbgtVal").textContent = "WBGT --\u2103";
    var telop = document.getElementById("wbgtTelop");
    telop.textContent = "--";
    telop.style.backgroundColor = "rgba(255,255,255,0.25)";
    telop.style.color = "#fff";
  }
}

function updateClock() {
  var now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("ja-JP", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
    timeZone: "Asia/Tokyo"
  });
}

setBottomView(0);
setInterval(function() {
  setBottomView((bottomViewIndex + 1) % BOTTOM_VIEW_COUNT);
}, ROTATE_MS);

updateClock();
setInterval(updateClock, 1000);

refresh();
setInterval(refresh, 10 * 60 * 1000);
</script>
